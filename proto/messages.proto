syntax = "proto3";

package corestream;

// The raw binary payload sent by the producer
message ProducerPayload {
    string topic = 1;
    bytes data = 2;
    uint64 timestamp = 3;
}

// The acknowledgment sent back from the leader node
message ServerAck {
    bool success = 1;
    string error_message = 2;
    uint64 offset = 3; // The log offset where this was saved
}

// Inter-Node communication for Clustering & Raft
message ClusterMessage {
    uint32 sender_node_id = 1;
    
    // Using oneof so we can easily add Raft specific payloads later
    oneof payload {
        ClusterPing ping = 2;
    }
}

message ClusterPing {
    bool is_leader = 1;
}
