syntax = "proto3";

package corestream;

message ProducerPayload {
    string topic = 1;
    bytes data = 2;
    uint64 timestamp = 3;
}

// The acknowledgment sent back from the leader node
message ServerAck {
    bool success = 1;
    string error_message = 2;
    uint64 offset = 3; // The log offset where this was saved
}

// Inter-Node communication for Clustering & Raft
message ClusterMessage {
    uint32 sender_node_id = 1;
    
    // Using oneof to support different Raft RPCs
    oneof payload {
        RequestVote request_vote = 2;
        VoteResponse vote_response = 3;
        AppendEntries append_entries = 4;
        AppendEntriesResponse append_entries_response = 5;
    }
}

// Sent by a Candidate to request votes
message RequestVote {
    uint64 term = 1;
    uint64 last_log_index = 2;
    uint64 last_log_term = 3;
}

// Sent by a Follower in response to RequestVote
message VoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
}

// Sent by Leader to replicate logs and act as a Heartbeat
message AppendEntries {
    uint64 term = 1;
    uint64 leader_commit = 2;
    
    // Log entries to replicate. If empty, it's just a heartbeat.
    // In our system, this contains the raw serialized ProducerPayload bytes.
    repeated bytes entries = 3; 
}

// Sent by Follower back to Leader after appending entries
message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 match_index = 3;
}

// Sent by a Consumer client to fetch a log
message ConsumerRequest {
    string topic = 1;
    uint64 offset = 2;
}

// Sent by Server back to Consumer
message ConsumerResponse {
    bool success = 1;
    string error_message = 2;
    bytes payload_bytes = 3; // Zero-copy raw binary read from disk
}

// Sent by an AI or Telemetry monitor to check node health
message TelemetryRequest {
}

message TelemetryResponse {
    uint32 node_id = 1;
    string role = 2;
    uint64 current_term = 3;
    uint64 commit_index = 4;
    uint64 storage_offset = 5;
}
