<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreStream Control Plane</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 255, 170, 0.15);
            --leader-color: #00ffaa;
            --follower-color: #4da6ff;
            --offline-color: #ff4d4d;
            --text-main: #f0f0f0;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 170, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(77, 166, 255, 0.03) 0%, transparent 50%);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .cluster-grid {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .node-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .node-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--follower-color);
            opacity: 0.8;
            transition: background 0.3s ease;
        }

        .node-card.leader {
            border-color: rgba(0, 255, 170, 0.3);
            box-shadow: 0 8px 32px var(--accent-glow);
            transform: translateY(-5px);
        }

        .node-card.leader::before {
            background: var(--leader-color);
            box-shadow: 0 0 15px var(--leader-color);
        }

        .node-card.offline {
            opacity: 0.6;
        }
        
        .node-card.offline::before {
            background: var(--offline-color);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .node-title {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 100px;
            letter-spacing: 1px;
        }

        .leader .status-badge { background: rgba(0, 255, 170, 0.1); color: var(--leader-color); border: 1px solid rgba(0, 255, 170, 0.2); }
        .follower .status-badge { background: rgba(77, 166, 255, 0.1); color: var(--follower-color); border: 1px solid rgba(77, 166, 255, 0.2); }
        .offline .status-badge { background: rgba(255, 77, 77, 0.1); color: var(--offline-color); border: 1px solid rgba(255, 77, 77, 0.2); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
        }

        .stat-value {
            color: #fff;
            font-weight: 700;
        }

        .leader .stat-value.highlight { color: var(--leader-color); }

        .storage-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }

        .storage-bar-fill {
            height: 100%;
            background: var(--follower-color);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .leader .storage-bar-fill {
            background: var(--leader-color);
        }

        .live-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
        }

        .ping-dot {
            width: 8px;
            height: 8px;
            background-color: var(--leader-color);
            border-radius: 50%;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pinging {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CoreStream Control Plane</h1>
        <p>Real-Time Raft Consensus & Telemetry Dashboard</p>
    </div>

    <div class="cluster-grid" id="cluster">
        <!-- Node cards will be injected here -->
    </div>

    <div class="live-indicator">
        <div class="ping-dot" id="ping"></div>
        Live Polling 127.0.0.1:3000
    </div>

    <script>
        const clusterDiv = document.getElementById('cluster');
        const pingDot = document.getElementById('ping');

        function createCard(node) {
            const isOffline = node.status === 'OFFLINE';
            const isLeader = node.role === 'Leader';
            
            let cardClass = 'node-card ';
            if (isOffline) cardClass += 'offline';
            else if (isLeader) cardClass += 'leader';
            else cardClass += 'follower';

            const roleIcon = isLeader ? '👑' : (isOffline ? '💀' : '👥');
            const displayRole = isOffline ? 'OFFLINE' : node.role.toUpperCase();

            // Calculate a fake percentage based on offset (just for visual flair)
            const storagePercent = Math.min((node.storage_offset / 100) * 100, 100) || 5;

            return `
                <div class="${cardClass}">
                    <div class="node-header">
                        <div class="node-title">${roleIcon} ${node.name}</div>
                        <div class="status-badge">${displayRole}</div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Address</span>
                        <span class="stat-value" style="color:var(--text-dim)">${node.address}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Raft Term</span>
                        <span class="stat-value">${node.term}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Commit Index</span>
                        <span class="stat-value ${isLeader ? 'highlight' : ''}">${node.commit_index}</span>
                    </div>
                    <div class="stat-row" style="margin-top: 20px;">
                        <span class="stat-label">Storage Offset</span>
                        <span class="stat-value highlight">${node.storage_offset}</span>
                    </div>
                    <div class="storage-bar-bg">
                        <div class="storage-bar-fill" style="width: ${storagePercent}%"></div>
                    </div>
                </div>
            `;
        }

        async function fetchTelemetry() {
            try {
                pingDot.classList.add('pinging');
                const response = await fetch('http://127.0.0.1:3000');
                const data = await response.json();
                
                clusterDiv.innerHTML = data.map(createCard).join('');
            } catch (err) {
                console.error("Failed to connect to Telemetry server", err);
                // If API is down, we don't clear the grid, just show offline indicator
                pingDot.style.backgroundColor = 'var(--offline-color)';
            } finally {
                setTimeout(() => pingDot.classList.remove('pinging'), 200);
            }
        }

        // Poll every 1 second
        setInterval(fetchTelemetry, 1000);
        fetchTelemetry(); // Initial fetch
    </script>
</body>
</html>
